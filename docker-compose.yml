services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: barth_db
      POSTGRES_USER: barth
      POSTGRES_PASSWORD: barth123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://barth:barth123@db:5432/barth_db
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
