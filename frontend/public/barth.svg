        font-family="'Sora', 'Space Grotesk', 'Inter', sans-serif"
        font-size="72" font-weight="600"
        fill="#e8e5de" text-anchor="middle">B</text>
  <!-- Triple lines — descending width -->
  <rect x="22" y="88" width="76" height="3"   rx="1.5"  fill="#666"/>
  <rect x="30" y="94.5" width="60" height="2.5" rx="1.25" fill="#444"/>
  <rect x="38" y="100" width="44" height="1.5" rx=".75"  fill="#2e2e2c"/>
